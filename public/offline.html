<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MindVault — Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Cabinet Grotesk', system-ui, sans-serif;
      background: #0f0f17;
      color: #e8e6df;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 2rem;
    }
    .container { max-width: 420px; }
    .icon { font-size: 4rem; margin-bottom: 1.5rem; opacity: 0.6; }
    h1 {
      font-family: 'Fraunces', Georgia, serif;
      font-size: 2.5rem;
      font-weight: 300;
      margin-bottom: 0.75rem;
      color: #c8a97e;
    }
    p { color: #8a8780; line-height: 1.6; margin-bottom: 2rem; }
    button {
      background: #c8a97e;
      color: #0f0f17;
      border: none;
      padding: 0.75rem 2rem;
      border-radius: 6px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: 0.02em;
    }
    button:hover { background: #d4b98c; }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">◎</div>
    <h1>You're Offline</h1>
    <p>MindVault can't reach the server right now. Your cached notes are still available — reconnect to sync new changes.</p>
    <button onclick="window.location.reload()">Try Again</button>
  </div>
</body>
</html>
